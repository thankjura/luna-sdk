# yaml-language-server: $schema=https://raw.githubusercontent.com/thankjura/luna-schemas/refs/heads/master/luna-plugin.schema.json?v12

key: ${project.groupId}.${project.artifactId} # Resolved from pom.xml
name: ${project.name}
version: ${project.version}
description: "${project.description}"
vendor:
  name: ${project.organization.name}
  url: ${project.organization.url}
resources:
  - key: messages
    type: i18n
    path: messages
  - key: styles
    type: css
    path: frontend/frontend.css
routes:
  - routeName: myDemoPage # Unique route name, use it in WebItem
    routePath: demo-page
    component: frontend/DemoView.js # Path to compiled component
    parent: admin
  - routeName: myTodoPage
    routePath: todo-page
    component: frontend/TodoView.js
    parent: admin
scanPackages:
  - ru.slie.luna.template # Scan packages for auto-inject components
restPackages:
  - name: Rest pack
    packages:
      - ru.slie.luna.template.rest
activeDocs:
  - ru.slie.luna.template.db.CardEntity
components:
  - key: TodoAdminSideBarSection
    name: Demo admin side bar section
    className: ru.slie.luna.template.web.DemoAdminSideBarSection
  - key: DemoAdminWebItem
    name: Demo web item
    className: ru.slie.luna.template.web.DemoAdminWebItem
  - key: TodoAdminWebItem
    name: Todo web item
    className: ru.slie.luna.template.web.TodoAdminWebItem