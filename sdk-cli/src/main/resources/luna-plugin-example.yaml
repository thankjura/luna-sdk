# yaml-language-server: $schema=https://raw.githubusercontent.com/thankjura/luna-schemas/refs/heads/master/luna-plugin.schema.json?v11

key: ${project.groupId}.${project.artifactId}
name: ${project.name}
version: ${project.version}
description: "${project.description}"
vendor:
  name: ${project.organization.name}
  url: ${project.organization.url}
resources:
  - key: messages
    path: messages
    type: i18n
routes:
  - routeName: demoRoute
    routePath: demo-route
    component: frontend/DemoView.js
restPackages:
  - name: Rest pack
    packages:
      - ru.slie.luna.templates.rest

components:
  - key: DemoAdminSection
    name: Admin demo section
    className: ru.slie.luna.web.DemoAdminSideBarSection
  - key: DemoWebItem
    name: Admin demo web item
    className: ru.slie.luna.web.DemoAdminWebItem