# yaml-language-server: $schema=https://raw.githubusercontent.com/thankjura/luna-schemas/refs/heads/master/luna-plugin.schema.json?v=1

key: ${project.groupId}.${project.artifactId}
name: ${project.name}
version: ${project.version}
description: ${project.description}

scanPackages:
  - ru.slie.luna.plugins.quick_reload

vendor:
  name: ${project.organization.name}
  url: ${project.organization.url}

resources:
  - key:  quickreload
    path: quickreload
    type: i18n

restPackages:
  - name: Rest module
    packages:
      - ru.slie.luna.plugins.quick_reload.rest

filters:
  - key: PluginResourceFilter
    name: Override resources rest endpoints
    className: ru.slie.luna.plugins.quick_reload.rest.PluginResourceFilter

components:
  - key: QuickReloadService
    name: Quick reload plugin service
    className: ru.slie.luna.plugins.quick_reload.QuickReloadService
